# Cookbook: "Flex layout positioning"
# https://esphome.io/cookbook/lvgl/#flex-layout-positioning
#
# A row of action buttons laid out via FLEX (no manual x/y). Demonstrates:
# obj container with layout type FLEX, flex_flow ROW, pad_row gap, child
# alignment. All styling is the LVGL default theme.

esphome:
  name: lvgl-sample-flex

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            align: TOP_MID
            y: 24
            text: 'Flex layout (ROW)'

        - obj:
            id: button_row
            align: CENTER
            y: -30
            width: 280
            height: 80
            bg_opa: TRANSP
            border_opa: TRANSP
            pad_all: 8
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_EVENLY
              flex_align_cross: CENTER
              pad_row: 8
              pad_column: 8
            widgets:
              - button:
                  width: 80
                  height: 56
                  widgets:
                    - label:
                        align: CENTER
                        text: 'Open'
              - button:
                  width: 80
                  height: 56
                  widgets:
                    - label:
                        align: CENTER
                        text: 'Stop'
              - button:
                  width: 80
                  height: 56
                  widgets:
                    - label:
                        align: CENTER
                        text: 'Close'
