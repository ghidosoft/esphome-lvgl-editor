# Cookbook: "Climate control" (spinbox target temperature)
# https://esphome.io/cookbook/lvgl/#climate-control
#
# A `spinbox` flanked by - / + buttons to adjust the target temperature.
# Demonstrates: spinbox with range/digits/decimal_places, FLEX row layout,
# button on_click triggering lvgl.spinbox.increment / decrement.

esphome:
  name: lvgl-sample-climate-spinbox

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      bg_color: 0x0f172a
      widgets:
        - label:
            x: 0
            y: 30
            align: TOP_MID
            text: "Target temperature"
            text_color: 0xe2e8f0

        - obj:
            align: CENTER
            y: 0
            width: 240
            height: 70
            bg_color: 0x1e293b
            radius: 10
            border_width: 0
            pad_all: 8
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              - button:
                  id: spin_down
                  width: 50
                  height: 50
                  bg_color: 0x334155
                  radius: 8
                  on_click:
                    - lvgl.spinbox.decrement: target_temp
                  widgets:
                    - label:
                        align: CENTER
                        text: "-"
                        text_color: 0xf9fafb

              - spinbox:
                  id: target_temp
                  width: 100
                  height: 50
                  text_align: CENTER
                  range_from: 15
                  range_to: 30
                  value: 22
                  digits: 3
                  decimal_places: 1
                  step: 0.5
                  rollover: false
                  text_color: 0xfbbf24

              - button:
                  id: spin_up
                  width: 50
                  height: 50
                  bg_color: 0x334155
                  radius: 8
                  on_click:
                    - lvgl.spinbox.increment: target_temp
                  widgets:
                    - label:
                        align: CENTER
                        text: "+"
                        text_color: 0xf9fafb
