# Cookbook: "Climate control" (spinbox target temperature)
# https://esphome.io/cookbook/lvgl/#climate-control
#
# A `spinbox` flanked by - / + buttons to adjust the target temperature.
# Demonstrates: spinbox with range/digits/decimal_places, FLEX row layout,
# button on_click triggering lvgl.spinbox.increment / decrement. Styling is
# the LVGL default theme.

esphome:
  name: lvgl-sample-climate-spinbox

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            align: TOP_MID
            y: 30
            text: "Target temperature"

        - obj:
            align: CENTER
            width: 240
            height: 70
            bg_opa: TRANSP
            border_opa: TRANSP
            pad_all: 8
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              - button:
                  id: spin_down
                  width: 50
                  height: 50
                  on_click:
                    - lvgl.spinbox.decrement: target_temp
                  widgets:
                    - label:
                        align: CENTER
                        text: "-"

              - spinbox:
                  id: target_temp
                  width: 100
                  height: 50
                  text_align: CENTER
                  range_from: 15
                  range_to: 30
                  value: 22
                  digits: 3
                  decimal_places: 1
                  step: 0.5
                  rollover: false

              - button:
                  id: spin_up
                  width: 50
                  height: 50
                  on_click:
                    - lvgl.spinbox.increment: target_temp
                  widgets:
                    - label:
                        align: CENTER
                        text: "+"
