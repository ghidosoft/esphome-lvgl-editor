# Cookbook: "Roller picker"
# https://esphome.io/cookbook/lvgl/#roller
#
# Two side-by-side `roller` widgets acting as a simple time picker (hour and
# minute). Demonstrates: roller options list, visible_row_count, mode INFINITE.
# Styling relies on the LVGL default theme — selected row highlights with
# the primary colour automatically.

esphome:
  name: lvgl-sample-roller-picker

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            align: TOP_MID
            y: 16
            text: 'Set alarm'

        - obj:
            align: CENTER
            y: 10
            width: 260
            height: 160
            bg_opa: TRANSP
            border_opa: TRANSP
            pad_all: 12
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_EVENLY
              flex_align_cross: CENTER
            widgets:
              - roller:
                  id: hour_roller
                  width: 90
                  height: 130
                  visible_row_count: 3
                  mode: INFINITE
                  options:
                    - '06'
                    - '07'
                    - '08'
                    - '09'
                    - '10'
                    - '11'
                    - '12'
                  selected_index: 1

              - label:
                  text: ':'

              - roller:
                  id: minute_roller
                  width: 90
                  height: 130
                  visible_row_count: 3
                  mode: INFINITE
                  options:
                    - '00'
                    - '15'
                    - '30'
                    - '45'
                  selected_index: 0
