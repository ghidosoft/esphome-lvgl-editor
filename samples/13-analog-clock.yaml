# Cookbook: "Analog clock"
# https://esphome.io/cookbook/lvgl/#analog-clock
#
# A circular `meter` configured with hour ticks and two indicator lines acting
# as hour and minute hands. Demonstrates: meter with scales, tick_style major
# strides, line indicators with explicit values. Hands keep the cookbook's
# explicit black `color: 0x000000` (semantic — they need to read on top of
# the meter face); the meter face itself is the LVGL default theme.

esphome:
  name: lvgl-sample-analog-clock

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - meter:
            id: clock
            align: CENTER
            width: 200
            height: 200
            scales:
              - range_from: 0
                range_to: 60
                angle_range: 360
                rotation: 270
                ticks:
                  count: 61
                  width: 1
                  length: 8
                  major:
                    stride: 5
                    width: 3
                    length: 14
                    label_gap: 14
                indicators:
                  - line:
                      id: minute_hand
                      width: 3
                      color: 0x000000
                      length: 80
                      value: 24
                  - line:
                      id: hour_hand
                      width: 5
                      color: 0x000000
                      length: 50
                      value: 50
