# Cookbook (adapted): "Page navigation footer"
# https://esphome.io/cookbook/lvgl/#page-navigation-footer
#
# Two pages with a footer of buttons that navigate via on_click +
# lvgl.page.show. The cookbook uses `buttonmatrix` (not yet supported by the
# editor); this adaptation uses three regular buttons in a FLEX row, styled
# entirely by the LVGL default theme.

esphome:
  name: lvgl-sample-multipage

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: home_page
      widgets:
        - label:
            align: TOP_MID
            y: 60
            text: "Home"

        - label:
            align: TOP_MID
            y: 100
            text: "Welcome to the dashboard"

        - obj:
            align: BOTTOM_MID
            y: -10
            width: 300
            height: 60
            bg_opa: TRANSP
            border_opa: TRANSP
            pad_all: 6
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_EVENLY
              flex_align_cross: CENTER
            widgets:
              - button:
                  width: 110
                  height: 44
                  on_click:
                    - lvgl.page.show: home_page
                  widgets:
                    - label:
                        align: CENTER
                        text: "Home"
              - button:
                  width: 110
                  height: 44
                  on_click:
                    - lvgl.page.show: settings_page
                  widgets:
                    - label:
                        align: CENTER
                        text: "Settings"

    - id: settings_page
      widgets:
        - label:
            align: TOP_MID
            y: 60
            text: "Settings"

        - label:
            align: TOP_MID
            y: 100
            text: "Tap a footer button to switch page"

        - obj:
            align: BOTTOM_MID
            y: -10
            width: 300
            height: 60
            bg_opa: TRANSP
            border_opa: TRANSP
            pad_all: 6
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_EVENLY
              flex_align_cross: CENTER
            widgets:
              - button:
                  width: 110
                  height: 44
                  on_click:
                    - lvgl.page.show: home_page
                  widgets:
                    - label:
                        align: CENTER
                        text: "Home"
              - button:
                  width: 110
                  height: 44
                  on_click:
                    - lvgl.page.show: settings_page
                  widgets:
                    - label:
                        align: CENTER
                        text: "Settings"
