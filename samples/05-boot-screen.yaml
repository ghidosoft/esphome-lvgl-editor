# Cookbook: "ESPHome boot screen"
# https://esphome.io/cookbook/lvgl/#esphome-boot-screen
#
# A full-screen splash with a centered placeholder and a spinner. Demonstrates:
# obj as full-screen container, spinner widget, nested centered content.
# The cookbook explicitly forces the splash to white (`bg_color: 0xffffff`,
# `bg_opa: COVER`) so it covers any underlying page; everything else relies
# on the LVGL default theme.

esphome:
  name: lvgl-sample-boot

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: boot_page
      widgets:
        - obj:
            id: boot_overlay
            x: 0
            y: 0
            width: 100%
            height: 100%
            align: CENTER
            bg_color: 0xffffff
            bg_opa: COVER
            radius: 0
            pad_all: 0
            border_width: 0
            widgets:
              - label:
                  align: CENTER
                  y: -40
                  text: 'ESPHome'

              - label:
                  align: CENTER
                  text: 'Booting...'

              - spinner:
                  align: CENTER
                  y: 60
                  width: 50
                  height: 50
                  spin_time: 1s
                  arc_length: 60deg
                  arc_width: 8
                  indicator:
                    arc_color: 0x18bcf2
                    arc_width: 8
