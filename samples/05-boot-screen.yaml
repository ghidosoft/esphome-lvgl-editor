# Cookbook: "ESPHome boot screen"
# https://esphome.io/cookbook/lvgl/#esphome-boot-screen
#
# A full-screen splash with a centered placeholder and a spinner. Demonstrates:
# obj as full-screen container, spinner widget, nested centered content.

esphome:
  name: lvgl-sample-boot

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: boot_page
      bg_color: 0x0f172a
      widgets:
        - obj:
            id: boot_overlay
            x: 0
            y: 0
            width: 100%
            height: 100%
            align: CENTER
            bg_color: 0x0f172a
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  x: 0
                  y: -40
                  align: CENTER
                  text: "ESPHome"
                  text_color: 0x60a5fa

              - label:
                  x: 0
                  y: 0
                  align: CENTER
                  text: "Booting..."
                  text_color: 0x94a3b8

              - spinner:
                  x: 0
                  y: 60
                  align: CENTER
                  width: 50
                  height: 50
                  spin_time: 1000
                  arc_length: 60
                  arc_color: 0x60a5fa
                  arc_width: 6
