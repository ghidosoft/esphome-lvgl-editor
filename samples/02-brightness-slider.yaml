# Cookbook: "Light brightness slider"
# https://esphome.io/cookbook/lvgl/#light-brightness-slider
#
# A slider with a label above showing the current value. Demonstrates: slider
# with min/max/value, label, font sizing via text_font. Styling comes from
# the LVGL default theme (track muted blue, indicator + knob primary blue,
# circular radius).

esphome:
  name: lvgl-sample-brightness

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            id: title
            align: TOP_MID
            y: 30
            text: 'Brightness'

        - label:
            id: brightness_value
            align: TOP_MID
            y: 70
            text: '65 %'

        - slider:
            id: brightness_slider
            align: CENTER
            y: 20
            width: 260
            height: 20
            min_value: 0
            max_value: 100
            value: 65
