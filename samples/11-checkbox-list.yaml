# Cookbook: "Checkbox" widget
# https://esphome.io/cookbook/lvgl/#checkbox
#
# A vertical list of `checkbox` widgets in a FLEX column. Demonstrates:
# checkbox text + checked state, FLEX column layout. The container is
# transparent so the items sit on the screen background; the checkboxes
# themselves rely on the LVGL default theme (primary colour when checked).

esphome:
  name: lvgl-sample-checkbox-list

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            align: TOP_MID
            y: 18
            text: "Notifications"

        - obj:
            align: CENTER
            y: 10
            width: 260
            height: 160
            bg_opa: TRANSP
            border_opa: TRANSP
            pad_all: 16
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: START
              pad_row: 12
            widgets:
              - checkbox:
                  id: cb_email
                  text: "Email alerts"
                  checked: true

              - checkbox:
                  id: cb_push
                  text: "Push notifications"

              - checkbox:
                  id: cb_sms
                  text: "SMS"

              - checkbox:
                  id: cb_digest
                  text: "Weekly digest"
                  checked: true
