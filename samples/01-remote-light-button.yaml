# Cookbook: "Remote light button"
# https://esphome.io/cookbook/lvgl/#remote-light-button
#
# A single checkable button that toggles a "lamp" state, with a label below
# reporting on/off. Demonstrates: button (checkable), label, on_click,
# alignment. Styling comes entirely from the LVGL default theme — the
# `checked:` block flips the background to the secondary colour automatically
# (try the Checked toggle in the inspector).

esphome:
  name: lvgl-sample-light-button

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - button:
            id: lamp_btn
            align: CENTER
            width: 100
            height: 70
            checkable: true
            widgets:
              - label:
                  align: CENTER
                  text: 'Lamp'

        - label:
            id: lamp_state
            align: CENTER
            y: 60
            text: 'OFF'
