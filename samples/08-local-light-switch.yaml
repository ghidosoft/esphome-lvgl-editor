# Cookbook: "Local light switch"
# https://esphome.io/cookbook/lvgl/#local-light-switch
#
# A two-state `switch` widget toggling a local light, with a label below
# reflecting the state. Demonstrates: switch widget, on_value action,
# state-driven label update.

esphome:
  name: lvgl-sample-light-switch

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      bg_color: 0x111827
      widgets:
        - label:
            x: 0
            y: 40
            align: TOP_MID
            text: "Living room"
            text_color: 0xe2e8f0

        - switch:
            id: light_switch
            align: CENTER
            y: -10
            width: 80
            height: 40
            bg_color: 0x334155
            indicator:
              bg_color: 0x22c55e
            knob:
              bg_color: 0xf9fafb

        - label:
            id: light_state
            x: 0
            y: 60
            align: CENTER
            text: "OFF"
            text_color: 0x9ca3af
