# Cookbook: "Local light switch"
# https://esphome.io/cookbook/lvgl/#local-light-switch
#
# A two-state `switch` widget toggling a local light, with a label below
# reflecting the state. Demonstrates: switch widget, on_value action,
# state-driven label update. Styling is the LVGL default theme — when
# checked the indicator picks up the primary colour automatically.

esphome:
  name: lvgl-sample-light-switch

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            align: TOP_MID
            y: 40
            text: "Living room"

        - switch:
            id: light_switch
            align: CENTER
            y: -10

        - label:
            id: light_state
            align: CENTER
            y: 60
            text: "OFF"
