# Cookbook: "Grid layout positioning"
# https://esphome.io/cookbook/lvgl/#grid-layout-positioning
#
# A 3-column dashboard tile grid using fractional units (FR). Demonstrates:
# layout type GRID, grid_columns / grid_rows with FR sizing, grid_cell_*
# placement, child STRETCH alignment. Tile styling is LVGL default theme.

esphome:
  name: lvgl-sample-grid

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - obj:
            id: dashboard
            align: CENTER
            width: 300
            height: 220
            bg_opa: TRANSP
            border_opa: TRANSP
            pad_all: 6
            layout:
              type: GRID
              grid_rows: [FR(1), FR(1)]
              grid_columns: [FR(1), FR(1), FR(1)]
              pad_row: 6
              pad_column: 6
            widgets:
              - obj:
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  widgets:
                    - label:
                        align: CENTER
                        text: '21°C'
              - obj:
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  widgets:
                    - label:
                        align: CENTER
                        text: '48 %'
              - obj:
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  widgets:
                    - label:
                        align: CENTER
                        text: '1013'
              - obj:
                  grid_cell_row_pos: 1
                  grid_cell_column_pos: 0
                  grid_cell_column_span: 3
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  widgets:
                    - label:
                        align: CENTER
                        text: 'Living room'
