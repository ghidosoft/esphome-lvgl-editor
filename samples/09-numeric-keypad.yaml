# Cookbook: "Numeric keypad"
# https://esphome.io/cookbook/lvgl/#numeric-keypad
#
# A 3x4 numeric keypad built with `buttonmatrix`, plus a label above showing
# the entered code. Demonstrates: buttonmatrix rows/buttons, control_widgets,
# on_value action. Styling is the LVGL default theme.

esphome:
  name: lvgl-sample-keypad

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            id: code_display
            align: TOP_MID
            y: 14
            text: "----"

        - buttonmatrix:
            id: keypad
            align: BOTTOM_MID
            y: -10
            width: 240
            height: 180
            rows:
              - buttons:
                  - text: "1"
                  - text: "2"
                  - text: "3"
              - buttons:
                  - text: "4"
                  - text: "5"
                  - text: "6"
              - buttons:
                  - text: "7"
                  - text: "8"
                  - text: "9"
              - buttons:
                  - text: "C"
                  - text: "0"
                  - text: "OK"
