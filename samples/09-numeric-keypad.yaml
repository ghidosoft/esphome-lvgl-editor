# Cookbook: "Numeric keypad"
# https://esphome.io/cookbook/lvgl/#numeric-keypad
#
# A 3x4 numeric keypad built with `buttonmatrix`, plus a label above showing
# the entered code. Demonstrates: buttonmatrix rows/buttons, control_widgets
# styling, on_value action.

esphome:
  name: lvgl-sample-keypad

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      bg_color: 0x0f172a
      widgets:
        - label:
            id: code_display
            x: 0
            y: 14
            align: TOP_MID
            text: "----"
            text_color: 0xfbbf24

        - buttonmatrix:
            id: keypad
            align: BOTTOM_MID
            y: -10
            width: 240
            height: 180
            bg_color: 0x111827
            border_width: 0
            pad_all: 4
            items:
              bg_color: 0x1f2937
              border_color: 0x374151
              border_width: 1
              radius: 6
              text_color: 0xf9fafb
            rows:
              - buttons:
                  - text: "1"
                  - text: "2"
                  - text: "3"
              - buttons:
                  - text: "4"
                  - text: "5"
                  - text: "6"
              - buttons:
                  - text: "7"
                  - text: "8"
                  - text: "9"
              - buttons:
                  - text: "C"
                    control:
                      bg_color: 0x991b1b
                  - text: "0"
                  - text: "OK"
                    control:
                      bg_color: 0x166534
