# Cookbook: "ESPHome boot screen" (top_layer + fade)
# https://esphome.io/cookbook/lvgl/#esphome-boot-screen
#
# A boot splash placed in `top_layer` so it covers any page, then fades out
# when the system is ready. Demonstrates: top_layer overlay slot, animation
# via on_value / lvgl.widget.update with bg_opa, on_press dismissal.

esphome:
  name: lvgl-sample-boot-fade

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: main_page
      bg_color: 0x0f172a
      widgets:
        - label:
            align: CENTER
            text: "Dashboard"
            text_color: 0xe2e8f0

  top_layer:
    widgets:
      - obj:
          id: boot_overlay
          x: 0
          y: 0
          width: 100%
          height: 100%
          align: CENTER
          bg_color: 0x0f172a
          bg_opa: COVER
          border_width: 0
          radius: 0
          pad_all: 0
          on_press:
            - lvgl.widget.hide: boot_overlay
          widgets:
            - label:
                align: CENTER
                y: -30
                text: "ESPHome"
                text_color: 0x60a5fa

            - label:
                align: CENTER
                y: 0
                text: "Booting..."
                text_color: 0x94a3b8

            - spinner:
                align: CENTER
                y: 50
                width: 50
                height: 50
                spin_time: 1000
                arc_length: 60
                arc_color: 0x60a5fa
                arc_width: 6
