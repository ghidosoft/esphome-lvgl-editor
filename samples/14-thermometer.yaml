# Cookbook: "Thermometer"
# https://esphome.io/cookbook/lvgl/#meter
#
# A semicircle meter with a colour-gradient tick scale (blue→red) and a red
# line needle. Demonstrates: dual `scales:` (one for the human-readable
# labels in °C, a second one in tenths of a degree to give the needle finer
# resolution), `tick_style:` indicator with `color_start`/`color_end`,
# 240°/150° rotation, percent-based needle `length`, and child labels nested
# inside the meter.
#
# The on-device wiring uses a `sensor:` to push readings via
# `lvgl.indicator.update`; for the static preview we hard-code `value: 230`
# (= 23.0°C in the second scale) so the needle and label settle on a
# realistic position.

esphome:
  name: lvgl-sample-thermometer

display:
  - dimensions:
      width: 320
      height: 240

lvgl:
  pages:
    - id: meter_page
      widgets:
        - meter:
            align: CENTER
            height: 180
            width: 180
            scales:
              # Outer scale: integer °C labels every 5°.
              - range_from: -10
                range_to: 40
                angle_range: 240
                rotation: 150
                ticks:
                  width: 1
                  count: 51
                  length: 10
                  color: 0x000000
                  major:
                    stride: 5
                    width: 2
                    length: 10
                    color: 0x404040
                    label_gap: 10
                indicators:
                  - tick_style:
                      start_value: -10
                      end_value: 40
                      color_start: 0x0000bd
                      color_end: 0xbd0000
                      width: 1
              # Inner scale (no ticks): drives the needle in 0.1°C steps so
              # `lvgl.indicator.update` from a sensor lambda gets sub-degree
              # resolution. Range is the outer scale × 10.
              - range_from: -100
                range_to: 400
                angle_range: 240
                rotation: 150
                indicators:
                  - line:
                      id: temperature_needle
                      width: 2
                      color: 0xFF0000
                      length: 96%
                      value: 230
            widgets:
              - label:
                  id: temperature_text
                  text: '23.0°C'
                  align: CENTER
                  y: 45
              - label:
                  text: 'Outdoor'
                  align: CENTER
                  y: 65
